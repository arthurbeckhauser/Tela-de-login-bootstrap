<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .login-card {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 15px;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
        }
        
        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                
                <div class="card login-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock-fill logo"></i>
                        <h2 class="mt-3 fw-bold">Bem-vindo de volta</h2>
                        <p class="text-muted">Faça login para acessar sua conta</p>
                    </div>

                    <form>
                        <div class="mb-4">
                            <label for="email" class="form-label fw-medium">E-mail</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" 
                                       class="form-control" 
                                       id="email" 
                                       placeholder="seuemail@exemplo.com" 
                                       required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="senha" class="form-label fw-medium">Senha</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" 
                                       class="form-control" 
                                       id="senha" 
                                       placeholder="••••••••" 
                                       required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="lembrar">
                                <label class="form-check-label" for="lembrar">
                                    Lembrar-me
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none">Esqueci minha senha</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-login mb-3">
                            Entrar
                        </button>

                        <div class="text-center">
                            <p class="mb-0">
                                Não tem uma conta? 
                                <a href="#" class="text-decoration-none fw-medium">Criar conta</a>
                            </p>
                        </div>
                    </form>
                </div>

                <div class="text-center mt-4 text-white-50 small">
                    <p>© 2026 - Atividade Bootstrap</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
