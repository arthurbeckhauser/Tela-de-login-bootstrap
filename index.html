<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Fórum Sr. Chefe</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-image: url('smiling.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.login-box{
    background:#222;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);

h1{
    text-align:center;
}
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    background:#FFDF58;
    border:none;
    border-radius:6px;
    color:rgb(0, 0, 0);
    cursor:pointer;
}

button:hover{
    background:#FFDF58;
}

#mensagem{
    margin-top:15px;
    text-align:center;
    color:red;
}

</style>
</head>

<body>

<div class="login-box">

    <h1>Login</h1>

    <input type="text" id="usuario" placeholder="Usuário">

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="logar()">Entrar</button>

    <p id="mensagem"></p>

</div>

<script src="script.js"></script>

</body>
</html>
